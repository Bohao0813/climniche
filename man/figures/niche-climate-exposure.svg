<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Niche climate exposure conceptual diagram">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2f6f9f"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#bd5a54"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4f927f"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#d1902e"/>
    </marker>
    <marker id="arrowAxis" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#000000"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>

  <text x="56" y="58" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#000000">Niche climate exposure</text>
  <text x="56" y="90" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#000000">Projected climate change is measured relative to the centre and empirical boundary of the current realised climatic niche.</text>

  <rect x="56" y="132" width="748" height="412" fill="#ffffff" stroke="#d6d6d6" stroke-width="1.4"/>
  <text x="88" y="170" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#000000">Weighted climate space</text>
  <text x="88" y="198" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#000000">The centre is the weighted mean of current reference climate conditions.</text>

  <g transform="translate(104 228)">
    <line x1="34" y1="250" x2="638" y2="250" stroke="#000000" stroke-width="1.4" marker-end="url(#arrowAxis)"/>
    <line x1="34" y1="250" x2="34" y2="20" stroke="#000000" stroke-width="1.4" marker-end="url(#arrowAxis)"/>
    <text x="268" y="292" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#000000">climate-space axis 1</text>
    <text x="-52" y="143" transform="rotate(-90 -52 143)" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#000000">climate-space axis 2</text>

    <ellipse cx="320" cy="150" rx="160" ry="72" transform="rotate(-18 320 150)" fill="#dfecea" stroke="#1d514b" stroke-width="2.5"/>
    <ellipse cx="320" cy="150" rx="221" ry="102" transform="rotate(-18 320 150)" fill="none" stroke="#1d514b" stroke-width="2.3" stroke-dasharray="8 7"/>
    <text x="390" y="57" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#000000">empirical boundary Bq</text>

    <circle cx="320" cy="150" r="7" fill="#ffffff" stroke="#000000" stroke-width="2.4"/>
    <circle cx="320" cy="150" r="2.6" fill="#000000"/>
    <text x="332" y="154" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#000000">mu</text>

    <circle cx="226" cy="207" r="7" fill="#2f6f9f"/>
    <text x="199" y="232" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#000000">current cell ci</text>
    <circle cx="532" cy="73" r="7" fill="#bd5a54"/>
    <text x="543" y="76" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#000000">future cell fi</text>

    <line x1="226" y1="207" x2="532" y2="73" stroke="#2f6f9f" stroke-width="4.2" marker-end="url(#arrowBlue)"/>
    <text x="337" y="103" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#2f6f9f">Climatic Displacement Di</text>

    <line x1="320" y1="150" x2="226" y2="207" stroke="#bd5a54" stroke-width="2.5" stroke-dasharray="6 5"/>
    <line x1="320" y1="150" x2="532" y2="73" stroke="#bd5a54" stroke-width="2.5" stroke-dasharray="6 5"/>
    <path d="M272,178 C322,224 426,212 488,104" fill="none" stroke="#bd5a54" stroke-width="3.2" marker-end="url(#arrowRed)"/>
    <text x="396" y="218" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#bd5a54">Niche Distance Shift Ri</text>

    <path d="M249,151 C314,78 424,59 489,88" fill="none" stroke="#4f927f" stroke-width="4" marker-end="url(#arrowGreen)"/>
    <text x="156" y="88" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#4f927f">Climatic Reconfiguration Ci</text>

    <line x1="470" y1="96" x2="532" y2="73" stroke="#d1902e" stroke-width="4.2" marker-end="url(#arrowOrange)"/>
    <text x="485" y="47" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#d1902e">Niche Boundary Exceedance Ei</text>
  </g>

  <rect x="842" y="132" width="302" height="412" fill="#ffffff" stroke="#d6d6d6" stroke-width="1.4"/>
  <text x="872" y="170" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#000000">Metric interpretation</text>

  <g transform="translate(874 218)" font-family="Arial, Helvetica, sans-serif">
    <line x1="0" y1="0" x2="54" y2="0" stroke="#2f6f9f" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <text x="72" y="5" font-size="16" font-weight="700" fill="#000000">Climatic Displacement</text>
    <text x="72" y="28" font-size="13" fill="#000000">magnitude of local climatic change</text>

    <line x1="0" y1="82" x2="54" y2="82" stroke="#bd5a54" stroke-width="4" marker-end="url(#arrowRed)"/>
    <text x="72" y="87" font-size="16" font-weight="700" fill="#000000">Niche Distance Shift</text>
    <text x="72" y="110" font-size="13" fill="#000000">signed radial change from the centre</text>

    <path d="M0,171 C18,149 40,149 58,171" fill="none" stroke="#4f927f" stroke-width="4" marker-end="url(#arrowGreen)"/>
    <text x="72" y="173" font-size="16" font-weight="700" fill="#000000">Climatic Reconfiguration</text>
    <text x="72" y="196" font-size="13" fill="#000000">non radial change in climate balance</text>

    <line x1="0" y1="252" x2="54" y2="252" stroke="#d1902e" stroke-width="4" marker-end="url(#arrowOrange)"/>
    <text x="72" y="257" font-size="16" font-weight="700" fill="#000000">Niche Boundary Exceedance</text>
    <text x="72" y="280" font-size="13" fill="#000000">positive excess beyond Bq</text>
  </g>

  <text x="56" y="586" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#000000">The drawing is conceptual; all metric values are calculated in the full sensitivity weighted climatic space before plotting.</text>
</svg>
